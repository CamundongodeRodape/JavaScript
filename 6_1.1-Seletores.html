<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --warn: #f97316;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1f2937, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(640px, 100%);
      background: linear-gradient(180deg, #111827, #0b1220);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .form {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #0b1020;
      color: var(--text);
      outline: none;
    }

    .form input[type="text"]::placeholder {
      color: var(--muted);
    }

    .form button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #052e14;
      font-weight: 700;
      cursor: pointer;
    }

    .form button:hover {
      filter: brightness(1.05);
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tarefa {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      background: #0b1020;
    }

    .tarefa input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .descricao {
      font-size: 16px;
    }

    .concluida .descricao {
      color: var(--muted);
      text-decoration: line-through;
    }

    .nao-concluida .descricao {
      color: var(--text);
    }

    .status {
      margin-left: auto;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .concluida .status {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }

    .nao-concluida .status {
      background: rgba(249, 115, 22, 0.2);
      color: #fdba74;
      border: 1px solid rgba(249, 115, 22, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lista de Tarefas</h1>
    <div class="form">
      <input id="descricao" type="text" placeholder="Digite a descriçăo da tarefa" />
      <button id="adicionar">Adicionar</button>
    </div>
    <div id="lista" class="lista"></div>
  </div>

  <script>
    const tarefas = [];

    const descricaoInput = document.getElementById("descricao");
    const adicionarBtn = document.getElementById("adicionar");
    const listaEl = document.getElementById("lista");

    function renderizar() {
      listaEl.innerHTML = "";

      tarefas.forEach((tarefa, index) => {
        const item = document.createElement("div");
        item.className = `tarefa ${tarefa.status ? "concluida" : "nao-concluida"}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = tarefa.status;
        checkbox.addEventListener("change", () => {
          tarefa.status = checkbox.checked;
          renderizar();
        });

        const descricao = document.createElement("span");
        descricao.className = "descricao";
        descricao.textContent = tarefa.descricao;

        const status = document.createElement("span");
        status.className = "status";
        status.textContent = tarefa.status ? "Concluido" : "Nao concluido";

        item.appendChild(checkbox);
        item.appendChild(descricao);
        item.appendChild(status);

        listaEl.appendChild(item);
      });
    }

    function adicionarTarefa() {
      const texto = descricaoInput.value.trim();
      if (!texto) {
        return;
      }

      tarefas.push({
        descricao: texto,
        status: false,
      });

      descricaoInput.value = "";
      descricaoInput.focus();
      renderizar();
    }

    adicionarBtn.addEventListener("click", adicionarTarefa);
    descricaoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        adicionarTarefa();
      }
    });

    renderizar();
  </script>
</body>
</html>
