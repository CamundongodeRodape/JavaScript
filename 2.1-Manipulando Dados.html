<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca de Usu&aacute;rios</title>
  <style>
    :root {
      --bg: #eaf2ee;
      --card: rgba(251, 255, 252, 0.92);
      --text: #193126;
      --muted: #5f786b;
      --line: rgba(47, 92, 71, 0.14);
      --accent: #1f7a57;
      --accent-dark: #15543c;
      --surface: rgba(240, 247, 243, 0.96);
      --shadow: 0 24px 60px rgba(22, 56, 41, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(164, 225, 198, 0.7), transparent 34%),
        radial-gradient(circle at bottom right, rgba(31, 122, 87, 0.18), transparent 36%),
        linear-gradient(135deg, #eef7f2, #d8e8df);
    }

    .card {
      width: min(760px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    .descricao {
      margin-bottom: 24px;
      color: var(--muted);
    }

    .acoes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1 1 320px;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.82);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(31, 122, 87, 0.55);
      box-shadow: 0 0 0 4px rgba(31, 122, 87, 0.12);
    }

    button {
      min-height: 52px;
      padding: 0 22px;
      border: 0;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      color: #f7fffb;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
    }

    .mensagem {
      min-height: 28px;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .lista {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .usuario {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      border: 1px solid rgba(47, 92, 71, 0.12);
    }

    .login {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }

    .tipo {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .link {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .card {
        padding: 24px;
      }

      .acoes {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .usuario {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .avatar {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Buscar usu&aacute;rios no GitHub</h1>
    <p class="descricao">
      Digite um termo, clique no bot&atilde;o e veja a lista de perfis encontrados pela API do GitHub.
    </p>

    <div class="acoes">
      <input id="busca" type="text" placeholder="Digite um nome de usu&aacute;rio" />
      <button id="buscar" type="button">Buscar</button>
    </div>

    <p id="mensagem" class="mensagem" aria-live="polite"></p>
    <ul id="listaUsuarios" class="lista"></ul>
  </main>

  <script>
    const buscaInput = document.getElementById("busca");
    const buscarButton = document.getElementById("buscar");
    const mensagem = document.getElementById("mensagem");
    const listaUsuarios = document.getElementById("listaUsuarios");

    function limparResultados() {
      listaUsuarios.innerHTML = "";
    }

    function mostrarMensagem(texto) {
      mensagem.textContent = texto;
    }

    function criarItemUsuario(usuario) {
      const item = document.createElement("li");
      item.className = "usuario";

      const avatar = document.createElement("img");
      avatar.className = "avatar";
      avatar.src = usuario.avatar_url;
      avatar.alt = "Avatar de " + usuario.login;

      const conteudo = document.createElement("div");

      const login = document.createElement("h2");
      login.className = "login";
      login.textContent = usuario.login;

      const tipo = document.createElement("p");
      tipo.className = "tipo";
      tipo.textContent = "Tipo: " + usuario.type;

      const link = document.createElement("a");
      link.className = "link";
      link.href = usuario.html_url;
      link.target = "_blank";
      link.rel = "noreferrer";
      link.textContent = "Abrir perfil";

      conteudo.appendChild(login);
      conteudo.appendChild(tipo);
      conteudo.appendChild(link);

      item.appendChild(avatar);
      item.appendChild(conteudo);

      return item;
    }

    async function buscarUsuarios() {
      const termo = buscaInput.value.trim();

      limparResultados();

      if (!termo) {
        mostrarMensagem("Digite um termo para pesquisar.");
        buscaInput.focus();
        return;
      }

      mostrarMensagem("Buscando usu\u00e1rios...");
      buscarButton.disabled = true;

      try {
        const resposta = await fetch(
          "https://api.github.com/search/users?q=" + encodeURIComponent(termo)
        );

        if (!resposta.ok) {
          throw new Error("Falha ao consultar a API do GitHub.");
        }

        const dados = await resposta.json();
        const usuarios = Array.isArray(dados.items) ? dados.items : [];

        if (usuarios.length === 0) {
          mostrarMensagem("N\u00e3o foram encontrados usu\u00e1rios para esta pesquisa");
          return;
        }

        if (usuarios.length === 1) {
          mostrarMensagem("1 usu\u00e1rio encontrado.");
        } else {
          mostrarMensagem(usuarios.length + " usu\u00e1rios encontrados.");
        }

        usuarios.forEach((usuario) => {
          listaUsuarios.appendChild(criarItemUsuario(usuario));
        });
      } catch (erro) {
        mostrarMensagem("N\u00e3o foi poss\u00edvel carregar os usu\u00e1rios agora.");
      } finally {
        buscarButton.disabled = false;
      }
    }

    buscarButton.addEventListener("click", buscarUsuarios);
  </script>
</body>
</html>
